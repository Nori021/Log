<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>作業ログbot</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c12; --s1:#11141e; --s2:#181c2a; --s3:#1f2436;
  --bd:#272d42; --bd2:#323a55;
  --blue:#5b8df6; --purple:#8b5cf6; --green:#34d399;
  --orange:#fb923c; --yellow:#fbbf24; --red:#f87171; --cyan:#22d3ee;
  --text:#e8ecf8; --muted:#5a6380; --dim:#2d3348;
  --r:10px; --mono:'DM Mono',monospace; --sans:'Noto Sans JP',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column}

/* ═══════════ HEADER ═══════════ */
.hdr{height:52px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-name em{color:var(--blue);font-style:normal}
.nav{display:flex;gap:2px;margin-left:6px}
.nbtn{padding:5px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:500;color:var(--muted);background:transparent;transition:all .15s}
.nbtn:hover{color:var(--text);background:var(--s3)}
.nbtn.on{color:var(--blue);background:rgba(91,141,246,.12)}
.hsp{flex:1}
.hdate{font-family:var(--mono);font-size:11px;color:var(--muted)}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--bd);color:var(--muted);transition:all .3s;white-space:nowrap}
.sync-pill.syncing{border-color:var(--blue);color:var(--blue)}
.sync-pill.synced{border-color:var(--green);color:var(--green)}
.sync-pill.error{border-color:var(--red);color:var(--red)}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.sync-pill.syncing .sdot{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ═══════════ PAGES ═══════════ */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;display:none}
.page.on{display:flex}

/* ═══════════ SHARED ENTRY STYLES ═══════════ */
.etag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;padding:1px 6px;border-radius:20px;margin-bottom:4px}
.etag-作業{background:rgba(91,141,246,.15);color:var(--blue)}
.etag-思考{background:rgba(139,92,246,.15);color:var(--purple)}
.etag-メモ{background:rgba(52,211,153,.15);color:var(--green)}
.etag-課題{background:rgba(251,146,60,.15);color:var(--orange)}
.etag-成果{background:rgba(251,191,36,.15);color:var(--yellow)}
.entry-text{font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-all}
.entry-text a{color:var(--cyan);text-decoration:none}
.entry-htags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.ehtag{font-size:10px;font-family:var(--mono);color:var(--cyan);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);padding:1px 7px;border-radius:20px;cursor:pointer;transition:all .13s}
.ehtag:hover,.ehtag.on{background:rgba(34,211,238,.2);border-color:var(--cyan)}
mark{background:rgba(251,191,36,.25);color:var(--yellow);border-radius:2px;padding:0 1px}
.ebtns{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0;transition:opacity .13s}
.ebt{background:none;border:none;cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;color:var(--muted);transition:all .13s}
.ebt.e:hover{color:var(--blue);background:rgba(91,141,246,.1)}
.ebt.d:hover{color:var(--red);background:rgba(248,113,113,.1)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--dim)}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted)}
.spin{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════ PC: PAGE 1 INPUT ═══════════ */
@media (min-width:768px) {
  .stream-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--bd)}
  .stream-toolbar{height:44px;flex-shrink:0;display:flex;align-items:center;padding:0 16px;gap:8px;border-bottom:1px solid var(--bd);background:var(--s1)}
  .toolbar-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
  .search-wrap{position:relative;flex:1;max-width:280px}
  .search-wrap input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:12px;padding:5px 26px 5px 10px;outline:none;transition:all .2s}
  .search-wrap input:focus{border-color:var(--blue)}
  .search-wrap input::placeholder{color:var(--dim)}
  .s-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px}
  .cat-pills{display:flex;gap:4px}
  .cp{padding:3px 8px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:10px;font-family:var(--sans);cursor:pointer;transition:all .13s;white-space:nowrap}
  .cp.on{border-color:var(--blue);color:var(--blue);background:rgba(91,141,246,.1)}
  .cp[data-f="思考"].on{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.1)}
  .cp[data-f="メモ"].on{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.1)}
  .cp[data-f="課題"].on{border-color:var(--orange);color:var(--orange);background:rgba(251,146,60,.1)}
  .cp[data-f="成果"].on{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.1)}
  .sc{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}

  /* tag cloud */
  .tag-cloud{padding:6px 16px;border-bottom:1px solid var(--bd);background:var(--bg);display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:34px}
  .tag-cloud.hide{display:none}
  .cloud-lbl{font-size:10px;color:var(--dim)}
  .hpill{padding:2px 9px;border-radius:20px;border:1px solid var(--bd2);background:rgba(34,211,238,.06);color:var(--cyan);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .13s}
  .hpill:hover,.hpill.on{background:rgba(34,211,238,.18);border-color:var(--cyan)}

  .stream-body{flex:1;overflow-y:auto;padding:16px 18px}
  .stream-body::-webkit-scrollbar{width:4px}
  .stream-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
  .day-block{margin-bottom:24px}
  .day-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding-bottom:9px;border-bottom:1px solid var(--bd);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .day-copy{font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid var(--bd);background:none;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all .13s}
  .day-copy:hover{border-color:var(--blue);color:var(--blue)}
  .entry{display:flex;gap:12px;padding:10px 12px;border-radius:9px;margin-bottom:5px;background:var(--s1);border:1px solid transparent;transition:all .13s;position:relative;animation:fadeUp .2s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .entry:hover{border-color:var(--bd);background:var(--s2)}
  .entry:hover .ebtns{opacity:1}
  .entry-time{font-family:var(--mono);font-size:11px;color:var(--blue);padding-top:2px;min-width:38px}
  .entry-body{flex:1;min-width:0}

  /* PC input bar */
  .input-bar{flex-shrink:0;border-top:1px solid var(--bd);background:var(--s1);padding:12px 16px}
  .tag-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .tbt{padding:4px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all .13s}
  .tbt:hover,.tbt.on{border-color:var(--blue);color:var(--blue);background:rgba(91,141,246,.1)}
  .tbt[data-tag="思考"].on{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.1)}
  .tbt[data-tag="メモ"].on{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.1)}
  .tbt[data-tag="課題"].on{border-color:var(--orange);color:var(--orange);background:rgba(251,146,60,.1)}
  .tbt[data-tag="成果"].on{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.1)}
  .htag-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .htag-lbl{font-size:11px;color:var(--cyan);font-family:var(--mono);font-weight:500;white-space:nowrap}
  .htag-input{flex:1;background:var(--s2);border:1px solid rgba(34,211,238,.25);border-radius:7px;color:var(--cyan);font-family:var(--mono);font-size:12px;padding:5px 10px;outline:none;transition:border-color .2s}
  .htag-input:focus{border-color:var(--cyan)}
  .htag-input::placeholder{color:rgba(34,211,238,.25)}
  .htag-preview{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;min-height:0}
  .input-row{display:flex;gap:10px;align-items:flex-end}
  .input-row textarea{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;padding:10px 13px;resize:none;min-height:68px;max-height:160px;outline:none;transition:border-color .2s}
  .input-row textarea:focus{border-color:var(--blue)}
  .input-row textarea::placeholder{color:var(--dim)}
  .send-btn{width:42px;height:42px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;cursor:pointer;color:white;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .send-btn:hover{opacity:.85;transform:scale(1.06)}
  .send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
  .input-hint{font-size:11px;color:var(--dim);margin-top:7px}
  .input-hint strong{color:var(--muted)}

  /* PC summary */
  .sum-panel{width:320px;flex-shrink:0;display:flex;flex-direction:column;background:var(--s1)}
  .sum-hdr{height:44px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--bd)}
  .sum-ttl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;flex:1}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px 14px;border-bottom:1px solid var(--bd)}
  .stat{background:var(--bg);border-radius:8px;padding:8px 4px;text-align:center}
  .stat-n{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--blue)}
  .stat-l{font-size:9px;color:var(--muted);margin-top:1px}
  .stabs{display:flex;border-bottom:1px solid var(--bd)}
  .stab{flex:1;padding:9px 6px;border:none;background:transparent;color:var(--muted);font-size:11px;font-family:var(--sans);cursor:pointer;border-bottom:2px solid transparent;transition:all .13s}
  .stab.on{color:var(--blue);border-bottom-color:var(--blue);background:rgba(91,141,246,.04)}
  .spane{flex:1;display:none;flex-direction:column;overflow:hidden;padding:12px 14px}
  .spane.on{display:flex}
  .ptop{display:flex;align-items:center;margin-bottom:10px;gap:6px}
  .dsel{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:11px;padding:5px 8px;outline:none;cursor:pointer;flex:1}
  .pcopy{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--muted);cursor:pointer;transition:all .13s;white-space:nowrap}
  .pcopy:hover{background:var(--s2);color:var(--text)}
  .pok{font-size:11px;color:var(--green);opacity:0;transition:opacity .3s}
  .pok.on{opacity:1}
  .rbox{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:12px;font-family:var(--mono);font-size:11px;color:var(--text);overflow-y:auto;white-space:pre-wrap;line-height:1.75;resize:none;outline:none}
  .rbox::-webkit-scrollbar{width:3px}
  .rbox::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
}

/* ═══════════ SP: PAGE 1 INPUT ═══════════ */
@media (max-width:767px) {
  .hdr{height:48px;padding:0 14px}
  .logo-name{font-size:14px}
  .hdate{display:none}
  .sync-pill span{display:none}
  .sync-pill{padding:4px 8px}

  .stream-panel{flex:1;display:flex;flex-direction:column;min-width:0}
  /* SP toolbar: search only */
  .stream-toolbar{height:44px;flex-shrink:0;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--bd);background:var(--s1)}
  .toolbar-title{display:none}
  .search-wrap{position:relative;flex:1}
  .search-wrap input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;padding:7px 30px 7px 12px;outline:none;transition:all .2s}
  .search-wrap input:focus{border-color:var(--blue)}
  .search-wrap input::placeholder{color:var(--dim)}
  .s-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px}
  .cat-pills{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cat-pills::-webkit-scrollbar{display:none}
  .cp{padding:4px 10px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all .13s;white-space:nowrap;flex-shrink:0}
  .cp.on{border-color:var(--blue);color:var(--blue);background:rgba(91,141,246,.1)}
  .cp[data-f="思考"].on{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.1)}
  .cp[data-f="メモ"].on{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.1)}
  .cp[data-f="課題"].on{border-color:var(--orange);color:var(--orange);background:rgba(251,146,60,.1)}
  .cp[data-f="成果"].on{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.1)}
  .sc{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}

  /* SP tag cloud */
  .tag-cloud{padding:6px 12px;border-bottom:1px solid var(--bd);background:var(--bg);display:flex;align-items:center;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:34px}
  .tag-cloud::-webkit-scrollbar{display:none}
  .tag-cloud.hide{display:none}
  .cloud-lbl{font-size:10px;color:var(--dim);flex-shrink:0}
  .hpill{padding:3px 10px;border-radius:20px;border:1px solid var(--bd2);background:rgba(34,211,238,.06);color:var(--cyan);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .13s;flex-shrink:0;white-space:nowrap}
  .hpill.on{background:rgba(34,211,238,.18);border-color:var(--cyan)}

  .stream-body{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
  .day-block{margin-bottom:18px}
  .day-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;padding-bottom:7px;border-bottom:1px solid var(--bd);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .day-copy{font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid var(--bd);background:none;color:var(--muted);cursor:pointer;font-family:var(--sans)}
  .entry{display:flex;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:var(--s1);border:1px solid var(--bd);position:relative;animation:fadeUp .2s ease}
  .entry:active .ebtns{opacity:1}
  .ebtns{opacity:1} /* SP: always show */
  .entry-time{font-family:var(--mono);font-size:11px;color:var(--blue);padding-top:2px;min-width:34px}
  .entry-body{flex:1;min-width:0}

  /* SP: summary panel hidden on input page, accessible via archive tab */
  .sum-panel{display:none}

  /* SP input bar — fixed bottom */
  .input-bar{flex-shrink:0;border-top:1px solid var(--bd);background:var(--s1);padding:10px 12px;padding-bottom:max(10px, env(safe-area-inset-bottom))}
  /* SP category row — horizontal scroll */
  .tag-row{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .tag-row::-webkit-scrollbar{display:none}
  .tbt{padding:6px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .13s;flex-shrink:0;white-space:nowrap}
  .tbt.on{border-color:var(--blue);color:var(--blue);background:rgba(91,141,246,.1)}
  .tbt[data-tag="思考"].on{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.1)}
  .tbt[data-tag="メモ"].on{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.1)}
  .tbt[data-tag="課題"].on{border-color:var(--orange);color:var(--orange);background:rgba(251,146,60,.1)}
  .tbt[data-tag="成果"].on{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.1)}
  /* SP #タグ行 */
  .htag-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .htag-lbl{font-size:12px;color:var(--cyan);font-family:var(--mono);font-weight:500;white-space:nowrap}
  .htag-input{flex:1;background:var(--s2);border:1px solid rgba(34,211,238,.25);border-radius:8px;color:var(--cyan);font-family:var(--mono);font-size:13px;padding:7px 10px;outline:none;transition:border-color .2s;-webkit-appearance:none}
  .htag-input:focus{border-color:var(--cyan)}
  .htag-input::placeholder{color:rgba(34,211,238,.25)}
  .htag-preview{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
  /* SP main input */
  .input-row{display:flex;gap:8px;align-items:flex-end}
  .input-row textarea{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.5;padding:10px 13px;resize:none;height:52px;outline:none;transition:border-color .2s;-webkit-appearance:none}
  .input-row textarea:focus{border-color:var(--blue);height:100px}
  .input-row textarea::placeholder{color:var(--dim)}
  .send-btn{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;cursor:pointer;color:white;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .send-btn:active{opacity:.8;transform:scale(.95)}
  .send-btn:disabled{opacity:.35}
  .input-hint{display:none}
}

/* ═══════════ PC: PAGE 2 ARCHIVE ═══════════ */
.arc-sidebar{width:240px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--s1)}
.arc-sidebar-hd{padding:12px 14px 10px;border-bottom:1px solid var(--bd)}
.arc-sidebar-ttl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.arc-search-in{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:12px;padding:6px 10px;outline:none;transition:border-color .2s}
.arc-search-in:focus{border-color:var(--blue)}
.arc-search-in::placeholder{color:var(--dim)}
.date-list{flex:1;overflow-y:auto;padding:6px}
.date-list::-webkit-scrollbar{width:3px}
.date-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.date-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .13s;margin-bottom:2px}
.date-item:hover{background:var(--s2)}
.date-item.sel{background:rgba(91,141,246,.12)}
.di-day{font-size:13px;font-weight:500;color:var(--text)}
.di-day.today{color:var(--blue)}
.di-meta{font-family:var(--mono);font-size:10px;color:var(--muted)}
.di-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;background:var(--s3);color:var(--muted)}
.date-item.sel .di-badge{background:rgba(91,141,246,.2);color:var(--blue)}
.arc-main{flex:1;display:flex;flex-direction:column;min-width:0}
.arc-toolbar{height:52px;flex-shrink:0;display:flex;align-items:center;padding:0 22px;border-bottom:1px solid var(--bd);background:var(--s1);gap:12px}
.arc-title{font-size:15px;font-weight:700;flex:1}
.arc-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.bsm{padding:6px 14px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .13s}
.bsm:hover{background:var(--s2);color:var(--text)}
.bsm.p{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:none}
.bsm.p:hover{opacity:.88}
.arc-body{flex:1;display:grid;grid-template-columns:1fr 360px;min-height:0;overflow:hidden}
.arc-entries{overflow-y:auto;padding:20px 22px}
.arc-entries::-webkit-scrollbar{width:4px}
.arc-entries::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
/* Timeline */
.tl-entry{display:flex;margin-bottom:12px;position:relative}
.tl-entry::before{content:'';position:absolute;left:46px;top:28px;bottom:-12px;width:1px;background:var(--bd)}
.tl-entry:last-child::before{display:none}
.tl-time{font-family:var(--mono);font-size:11px;color:var(--blue);min-width:46px;padding-top:10px}
.tl-dot{width:8px;height:8px;border-radius:50%;margin:12px 12px 0;flex-shrink:0;border:2px solid}
.tl-dot-作業{border-color:var(--blue);background:rgba(91,141,246,.2)}
.tl-dot-思考{border-color:var(--purple);background:rgba(139,92,246,.2)}
.tl-dot-メモ{border-color:var(--green);background:rgba(52,211,153,.2)}
.tl-dot-課題{border-color:var(--orange);background:rgba(251,146,60,.2)}
.tl-dot-成果{border-color:var(--yellow);background:rgba(251,191,36,.2)}
.tl-card{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;transition:all .13s;position:relative}
.tl-card:hover{border-color:var(--bd2);background:var(--s2)}
.tl-card:hover .ebtns{opacity:1}
.tl-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.4px;padding:1px 6px;border-radius:20px;margin-bottom:4px}
.tl-text{font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-all}
.tl-text a{color:var(--cyan);text-decoration:none}
.arc-report{border-left:1px solid var(--bd);display:flex;flex-direction:column;background:var(--s1);padding:18px}
.arc-rep-ttl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.arc-rbox{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:14px;font-family:var(--mono);font-size:11px;color:var(--text);overflow-y:auto;white-space:pre-wrap;line-height:1.8;resize:none;outline:none}
.arc-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--dim);text-align:center}

/* SP: Archive — full screen list → detail */
@media (max-width:767px) {
  #page-archive{flex-direction:column}
  .arc-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--bd);max-height:40vh}
  .arc-sidebar-hd{padding:10px 12px 8px}
  .date-list{padding:4px}
  .date-item{padding:8px 10px}
  .arc-main{flex:1;min-height:0}
  .arc-toolbar{height:44px;padding:0 14px}
  .arc-title{font-size:14px}
  .arc-body{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .arc-report{border-left:none;border-top:1px solid var(--bd);max-height:35vh;padding:12px}
  .arc-rep-ttl{margin-bottom:6px}
}

/* ═══════════ MODAL ═══════════ */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-bd.open{opacity:1;pointer-events:all}
.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:460px;max-width:calc(100vw - 24px);transform:translateY(10px) scale(.98);transition:transform .18s;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.modal-bd.open .modal{transform:translateY(0) scale(1)}
@media (max-width:767px) {
  .modal-bd{align-items:flex-end}
  .modal{width:100%;max-width:100%;border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));transform:translateY(20px)}
  .modal-bd.open .modal{transform:translateY(0)}
}
.modal-ttl{font-size:14px;font-weight:700;margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.modal-time{background:var(--s3);border:1px solid var(--bd);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:8px 11px;outline:none;transition:border-color .15s;width:130px}
.modal-time:focus{border-color:var(--blue)}
.mtags{display:flex;gap:6px;flex-wrap:wrap}
.mtag{padding:6px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .13s}
.mtag:hover,.mtag.on{border-color:var(--blue);color:var(--blue);background:rgba(91,141,246,.1)}
.mtag[data-tag="思考"].on{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.1)}
.mtag[data-tag="メモ"].on{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.1)}
.mtag[data-tag="課題"].on{border-color:var(--orange);color:var(--orange);background:rgba(251,146,60,.1)}
.mtag[data-tag="成果"].on{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.1)}
.modal-htag-input{width:100%;background:var(--s3);border:1px solid rgba(34,211,238,.25);border-radius:8px;color:var(--cyan);font-family:var(--mono);font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;margin-bottom:6px}
.modal-htag-input:focus{border-color:var(--cyan)}
.modal-htag-input::placeholder{color:rgba(34,211,238,.25)}
.modal-htag-preview{display:flex;gap:4px;flex-wrap:wrap;min-height:0}
.modal-ta{width:100%;background:var(--s3);border:1px solid var(--bd);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.6;padding:10px 12px;resize:vertical;min-height:80px;outline:none;transition:border-color .15s}
.modal-ta:focus{border-color:var(--blue)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.mbtn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:500;transition:all .15s}
.mbtn.cancel{background:transparent;border:1px solid var(--bd);color:var(--muted)}
.mbtn.cancel:hover{background:var(--s3)}
.mbtn.save{background:linear-gradient(135deg,var(--blue),var(--purple));color:white}
.mbtn.save:hover{opacity:.88}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);border:1px solid var(--bd2);border-radius:9px;padding:8px 16px;font-size:12px;color:var(--text);opacity:0;transition:all .22s;z-index:2000;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-mark">📋</div>
    <div class="logo-name">作業<em>Log</em>bot</div>
  </div>
  <div class="nav">
    <button class="nbtn on" onclick="showPage('input')">✏️ 入力</button>
    <button class="nbtn" onclick="showPage('archive')">📚 アーカイブ</button>
  </div>
  <div class="hsp"></div>
  <div class="hdate" id="hdate"></div>
  <div class="sync-pill" id="sync"><div class="sdot"></div><span id="sync-lbl">接続中...</span></div>
</div>

<div class="pages">

  <!-- ── PAGE 1: INPUT ── -->
  <div class="page on" id="page-input">
    <div class="stream-panel">
      <!-- toolbar -->
      <div class="stream-toolbar">
        <div class="toolbar-title">ストリーム</div>
        <div class="search-wrap">
          <input type="text" id="search-in" placeholder="🔍 キーワード / #タグ で検索..." oninput="doSearch()">
          <button class="s-clear" onclick="clearSearch()">✕</button>
        </div>
        <div class="cat-pills">
          <button class="cp" data-f="作業" onclick="toggleCat(this)">作業</button>
          <button class="cp" data-f="思考" onclick="toggleCat(this)">思考</button>
          <button class="cp" data-f="メモ" onclick="toggleCat(this)">メモ</button>
          <button class="cp" data-f="課題" onclick="toggleCat(this)">課題</button>
          <button class="cp" data-f="成果" onclick="toggleCat(this)">成果</button>
        </div>
        <span class="sc" id="sc"></span>
      </div>
      <!-- #タグクラウド -->
      <div class="tag-cloud hide" id="tag-cloud"><span class="cloud-lbl">#</span></div>
      <!-- stream -->
      <div class="stream-body" id="stream-body">
        <div class="loading-state"><div class="spin"></div><div>読み込み中...</div></div>
      </div>
      <!-- input bar -->
      <div class="input-bar">
        <div class="tag-row">
          <button class="tbt on" data-tag="作業" onclick="selTag(this)">✏️ 作業</button>
          <button class="tbt" data-tag="思考" onclick="selTag(this)">💭 思考</button>
          <button class="tbt" data-tag="メモ" onclick="selTag(this)">📝 メモ</button>
          <button class="tbt" data-tag="課題" onclick="selTag(this)">⚠️ 課題</button>
          <button class="tbt" data-tag="成果" onclick="selTag(this)">✅ 成果</button>
        </div>
        <div class="htag-row">
          <span class="htag-lbl">#</span>
          <input type="text" class="htag-input" id="htag-in"
            placeholder="民泊  GAS  スイミング（スペース区切り）"
            oninput="previewHtags('htag-in','htag-preview')">
        </div>
        <div class="htag-preview" id="htag-preview"></div>
        <div class="input-row">
          <textarea id="txt-in" placeholder="ここに入力 — Shift+Enter で送信" onkeydown="onKey(event)"></textarea>
          <button class="send-btn" id="send-btn" onclick="addLog()">↑</button>
        </div>
        <div class="input-hint">🎤 <strong>Fn を2回押す</strong> で音声入力</div>
      </div>
    </div>

    <!-- PC summary panel -->
    <div class="sum-panel">
      <div class="sum-hdr"><div class="sum-ttl">サマリー</div></div>
      <div class="stats-row">
        <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">合計</div></div>
        <div class="stat"><div class="stat-n" id="s-today">—</div><div class="stat-l">今日</div></div>
        <div class="stat"><div class="stat-n" id="s-days">—</div><div class="stat-l">記録日数</div></div>
        <div class="stat"><div class="stat-n" id="s-out">—</div><div class="stat-l">成果数</div></div>
      </div>
      <div class="stabs">
        <button class="stab on" onclick="selStab(this,'sp-daily')">📄 日報</button>
        <button class="stab" onclick="selStab(this,'sp-weekly')">📅 週まとめ</button>
      </div>
      <div class="spane on" id="sp-daily">
        <div class="ptop">
          <select class="dsel" id="date-sel" onchange="genDaily()"></select>
          <span class="pok" id="ok-d">✓</span>
          <button class="pcopy" onclick="copyRep('daily-box','ok-d')">コピー</button>
        </div>
        <textarea class="rbox" id="daily-box" readonly placeholder="日報が表示されます"></textarea>
      </div>
      <div class="spane" id="sp-weekly">
        <div class="ptop">
          <span style="font-size:11px;color:var(--muted);flex:1">直近7日間</span>
          <span class="pok" id="ok-w">✓</span>
          <button class="pcopy" onclick="copyRep('weekly-box','ok-w')">コピー</button>
        </div>
        <textarea class="rbox" id="weekly-box" readonly placeholder="週まとめが表示されます"></textarea>
      </div>
    </div>
  </div>

  <!-- ── PAGE 2: ARCHIVE ── -->
  <div class="page" id="page-archive">
    <div class="arc-sidebar">
      <div class="arc-sidebar-hd">
        <div class="arc-sidebar-ttl">記録日一覧</div>
        <input type="text" class="arc-search-in" id="arc-search" placeholder="日付を検索..." oninput="filterDates()">
      </div>
      <div class="date-list" id="date-list"></div>
    </div>
    <div class="arc-main">
      <div class="arc-toolbar">
        <div class="arc-title" id="arc-title">日付を選択してください</div>
        <div class="arc-count" id="arc-count"></div>
        <span class="pok" id="ok-arc">✓ コピー済</span>
        <button class="bsm p" onclick="copyRep('arc-rbox','ok-arc')">📋 日報コピー</button>
      </div>
      <div class="arc-body">
        <div class="arc-entries" id="arc-entries">
          <div class="arc-empty"><div style="font-size:32px;opacity:.2">📅</div><div style="font-size:13px">左の一覧から日付を選んでください</div></div>
        </div>
        <div class="arc-report">
          <div class="arc-rep-ttl">
            <span>日報</span>
            <button class="bsm" style="font-size:11px;padding:4px 10px" onclick="copyRep('arc-rbox','ok-arc')">コピー</button>
          </div>
          <textarea class="arc-rbox" id="arc-rbox" readonly placeholder="日付を選ぶと日報が表示されます"></textarea>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-bd" id="modal-bd" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-ttl">✏️ ログを編集</div>
    <div class="modal-field">
      <label class="modal-lbl">時刻</label>
      <input type="time" class="modal-time" id="m-time">
    </div>
    <div class="modal-field">
      <label class="modal-lbl">カテゴリ</label>
      <div class="mtags">
        <button class="mtag" data-tag="作業" onclick="selMtag(this)">✏️ 作業</button>
        <button class="mtag" data-tag="思考" onclick="selMtag(this)">💭 思考</button>
        <button class="mtag" data-tag="メモ" onclick="selMtag(this)">📝 メモ</button>
        <button class="mtag" data-tag="課題" onclick="selMtag(this)">⚠️ 課題</button>
        <button class="mtag" data-tag="成果" onclick="selMtag(this)">✅ 成果</button>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-lbl">#タグ（スペース区切り）</label>
      <input type="text" class="modal-htag-input" id="m-htag"
        placeholder="民泊  GAS  スイミング..."
        oninput="previewHtags('m-htag','m-htag-preview')">
      <div class="modal-htag-preview" id="m-htag-preview"></div>
    </div>
    <div class="modal-field">
      <label class="modal-lbl">内容</label>
      <textarea class="modal-ta" id="m-text"></textarea>
    </div>
    <div class="modal-foot">
      <button class="mbtn cancel" onclick="document.getElementById('modal-bd').classList.remove('open')">キャンセル</button>
      <button class="mbtn save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbymPX6jJxdcvpKWhFS9hWjToxrdPkDBXOeSqVdL_xP647oVDd-_mZdkpUV6U2yAClJ6gQ/exec';

// ── STATE ──
let logs       = [];
let activeTag  = '作業';
let searchKw   = '';
let catFilter  = new Set();
let hashFilter = '';
let editId     = null;
let editTag    = null;
let arcDate    = null;
let curPage    = 'input';

// ── INIT ──
async function init() {
  tickDate(); setInterval(tickDate, 30000);
  await fetchLogs();
}
function tickDate() {
  document.getElementById('hdate').textContent =
    new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

// ── PAGE ──
function showPage(p) {
  curPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  document.querySelectorAll('.nbtn').forEach((b,i) =>
    b.classList.toggle('on',(i===0&&p==='input')||(i===1&&p==='archive')));
  if (p==='archive') renderArcSidebar();
}

// ── SYNC STATUS ──
function setSyn(state,lbl) {
  const el = document.getElementById('sync');
  el.className = 'sync-pill '+state;
  document.getElementById('sync-lbl').textContent = lbl;
}

// ── API ──
async function gasGet(params) {
  const r = await fetch(GAS+'?'+new URLSearchParams(params).toString());
  return r.json();
}
async function fetchLogs() {
  setSyn('syncing','読み込み中...');
  try {
    const d = await gasGet({action:'list'});
    if (d.error) throw new Error(d.error);
    logs = d.logs || [];
    setSyn('synced','連携済');
    refreshAll();
  } catch(e) {
    setSyn('error','接続エラー');
    logs = JSON.parse(localStorage.getItem('wlbak')||'[]');
    refreshAll();
    toast('⚠️ オフライン — ローカルデータを表示中');
  }
}

// ── #タグ ──
function parseHtags(raw) {
  if (!raw) return [];
  return [...new Set(
    raw.split(/[\s,、]+/).filter(Boolean)
       .map(t => '#'+(t.startsWith('#')?t.slice(1):t).toLowerCase())
  )];
}
function htagsToRaw(htags) {
  return (htags||[]).map(t=>t.startsWith('#')?t.slice(1):t).join(' ');
}
function getAllHtags() {
  const all = new Set();
  logs.forEach(e => (e.htags||[]).forEach(t=>all.add(t)));
  return [...all].sort();
}
function previewHtags(inputId, previewId) {
  const raw = document.getElementById(inputId).value;
  const tags = parseHtags(raw);
  document.getElementById(previewId).innerHTML =
    tags.map(t=>`<span class="ehtag">${t}</span>`).join('');
}

// ── TAG CLOUD ──
function renderTagCloud() {
  const bar = document.getElementById('tag-cloud');
  const tags = getAllHtags();
  if (!tags.length) { bar.classList.add('hide'); return; }
  bar.classList.remove('hide');
  bar.innerHTML = '<span class="cloud-lbl">#</span>' +
    tags.map(t=>`<button class="hpill${hashFilter===t?' on':''}" onclick="toggleHFilter('${t}')">${t.slice(1)}</button>`).join('');
}
function toggleHFilter(tag) {
  hashFilter = hashFilter===tag ? '' : tag;
  // also update search input visually
  if (hashFilter) {
    document.getElementById('search-in').value = hashFilter;
    searchKw = '';
  } else {
    document.getElementById('search-in').value = '';
  }
  renderTagCloud();
  renderStream();
}

// ── CATEGORY ──
function selTag(btn) {
  document.querySelectorAll('.tbt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  activeTag = btn.dataset.tag;
}

// ── ADD LOG ──
async function addLog() {
  const text = document.getElementById('txt-in').value.trim();
  if (!text) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  const htags = parseHtags(document.getElementById('htag-in').value);
  const now   = new Date();
  const entry = {
    id: String(Date.now()), text, tag: activeTag, htags,
    timestamp: now.toISOString(), date: ds(now), time: ts(now)
  };
  logs.push(entry);
  bak();
  document.getElementById('txt-in').value   = '';
  document.getElementById('htag-in').value  = '';
  document.getElementById('htag-preview').innerHTML = '';
  refreshAll();
  const sb = document.getElementById('stream-body');
  setTimeout(()=>sb.scrollTop=sb.scrollHeight, 50);
  setSyn('syncing','保存中...');
  try {
    const r = await gasGet({
      action:'add', id:entry.id, date:entry.date, time:entry.time,
      tag:encodeURIComponent(entry.tag), text:encodeURIComponent(entry.text),
      htags:encodeURIComponent(JSON.stringify(entry.htags)),
      timestamp:entry.timestamp
    });
    if (r.error) throw new Error(r.error);
    setSyn('synced','保存完了');
    setTimeout(()=>setSyn('synced','連携済'),2000);
  } catch(e) {
    setSyn('error','保存失敗'); toast('⚠️ 保存に失敗。ローカルに保持中。');
  }
  btn.disabled = false;
}
function onKey(e) { if(e.key==='Enter'&&e.shiftKey){e.preventDefault();addLog();} }

// ── DELETE ──
async function delLog(id) {
  logs = logs.filter(e=>e.id!==id);
  bak(); refreshAll();
  try { await gasGet({action:'delete',id}); setSyn('synced','連携済'); }
  catch(e) { setSyn('error','削除失敗'); }
}

// ── EDIT MODAL ──
function openEdit(id) {
  const e = logs.find(x=>x.id===id); if(!e) return;
  editId=id; editTag=e.tag;
  document.getElementById('m-time').value = e.time;
  document.getElementById('m-text').value = e.text;
  document.getElementById('m-htag').value = htagsToRaw(e.htags);
  previewHtags('m-htag','m-htag-preview');
  document.querySelectorAll('.mtag').forEach(b=>b.classList.toggle('on',b.dataset.tag===e.tag));
  document.getElementById('modal-bd').classList.add('open');
  setTimeout(()=>document.getElementById('m-text').focus(),80);
}
function closeModal(ev) {
  if(ev&&ev.target!==document.getElementById('modal-bd')) return;
  document.getElementById('modal-bd').classList.remove('open');
  editId=null;
}
function selMtag(btn) {
  document.querySelectorAll('.mtag').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); editTag=btn.dataset.tag;
}
async function saveEdit() {
  if(!editId) return;
  const newTime = document.getElementById('m-time').value;
  const newText = document.getElementById('m-text').value.trim();
  const newHtags = parseHtags(document.getElementById('m-htag').value);
  if(!newText){toast('⚠️ 内容を入力してください');return;}
  const e = logs.find(x=>x.id===editId);
  e.time=newTime; e.tag=editTag; e.text=newText; e.htags=newHtags;
  bak();
  document.getElementById('modal-bd').classList.remove('open');
  refreshAll();
  setSyn('syncing','更新中...');
  try {
    const r = await gasGet({
      action:'update', id:e.id, date:e.date, time:e.time,
      tag:encodeURIComponent(e.tag), text:encodeURIComponent(e.text),
      htags:encodeURIComponent(JSON.stringify(e.htags))
    });
    if(r.error) throw new Error(r.error);
    setSyn('synced','更新完了'); setTimeout(()=>setSyn('synced','連携済'),2000);
  } catch(err){setSyn('error','更新失敗');}
  editId=null;
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('modal-bd').classList.remove('open');
});

// ── SEARCH / FILTER ──
function doSearch() {
  const raw = document.getElementById('search-in').value.trim().toLowerCase();
  if(raw.startsWith('#')) { hashFilter=raw; searchKw=''; }
  else { searchKw=raw; hashFilter=''; }
  renderTagCloud();
  renderStream();
}
function clearSearch() {
  document.getElementById('search-in').value='';
  searchKw=''; hashFilter='';
  renderTagCloud(); renderStream();
}
function toggleCat(btn) {
  const t=btn.dataset.f;
  if(catFilter.has(t)){catFilter.delete(t);btn.classList.remove('on');}
  else{catFilter.add(t);btn.classList.add('on');}
  renderStream();
}
function getFiltered() {
  return logs.filter(e=>{
    const mk = !searchKw || e.text.toLowerCase().includes(searchKw) ||
               (e.htags||[]).some(t=>t.includes(searchKw));
    const mf = catFilter.size===0 || catFilter.has(e.tag);
    const mh = !hashFilter || (e.htags||[]).includes(hashFilter);
    return mk&&mf&&mh;
  });
}

// ── RENDER STREAM ──
function renderStream() {
  const container = document.getElementById('stream-body');
  const data = getFiltered();
  const hasF = searchKw||catFilter.size||hashFilter;
  document.getElementById('sc').textContent = hasF ? data.length+'件' : '';
  if(!data.length){
    container.innerHTML=`<div class="empty-state">
      <div style="font-size:32px;opacity:.3">${hasF?'🔍':'💬'}</div>
      <div style="font-size:13px">${hasF?'該当するログがありません':'記録を入力してスタートしましょう'}</div>
    </div>`;
    return;
  }
  const groups={};
  data.forEach(e=>{if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e);});
  container.innerHTML = Object.keys(groups).sort().reverse().map(date=>{
    const rows = groups[date].map(e=>entryRow(e)).join('');
    return `<div class="day-block">
      <div class="day-lbl"><span>${fmtDate(date)}</span>
        <button class="day-copy" onclick="copyDay('${date}')">📋 コピー</button>
      </div>${rows}</div>`;
  }).join('');
}

function entryRow(e) {
  let text = e.text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" onclick="event.stopPropagation()">$1</a>');
  if(searchKw) text=text.replace(new RegExp(`(${esc(searchKw)})`,'gi'),'<mark>$1</mark>');
  const htags = e.htags||[];
  const tagsHtml = htags.length
    ? `<div class="entry-htags">${htags.map(t=>`<span class="ehtag${hashFilter===t?' on':''}" onclick="toggleHFilter('${t}')">${t}</span>`).join('')}</div>`
    : '';
  return `<div class="entry">
    <div class="ebtns">
      <button class="ebt e" onclick="openEdit('${e.id}')">✎</button>
      <button class="ebt d" onclick="delLog('${e.id}')">✕</button>
    </div>
    <div class="entry-time">${e.time}</div>
    <div class="entry-body">
      <span class="etag etag-${e.tag}">${e.tag}</span>
      <div class="entry-text">${text}</div>
      ${tagsHtml}
    </div></div>`;
}

// ── STATS ──
function renderStats() {
  const today=ds(new Date());
  document.getElementById('s-total').textContent=logs.length;
  document.getElementById('s-today').textContent=logs.filter(e=>e.date===today).length;
  document.getElementById('s-days').textContent=new Set(logs.map(e=>e.date)).size;
  document.getElementById('s-out').textContent=logs.filter(e=>e.tag==='成果').length;
}

// ── DATE SELECT ──
function renderDateSel() {
  const sel=document.getElementById('date-sel');
  const cur=sel.value;
  const today=ds(new Date());
  const dates=[...new Set(logs.map(e=>e.date))].sort().reverse();
  if(!dates.includes(today)) dates.unshift(today);
  sel.innerHTML=dates.map(d=>`<option value="${d}" ${d===(cur||today)?'selected':''}>${d===today?`今日 (${d})`:d}</option>`).join('');
}

// ── DAILY REPORT ──
function genDaily() {
  const sel=document.getElementById('date-sel');
  const date=sel?.value||ds(new Date());
  document.getElementById('daily-box').value=buildReport(date);
}
function buildReport(date) {
  const dl=logs.filter(e=>e.date===date);
  const [y,m,d]=date.split('-').map(Number);
  const lbl=new Date(y,m-1,d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  if(!dl.length) return `【作業ログ】${lbl}\n\n（この日のログはありません）`;
  const order=['成果','作業','思考','課題','メモ'];
  const ico={成果:'✅',作業:'✏️',思考:'💭',課題:'⚠️',メモ:'📝'};
  let out=`【作業ログ】${lbl}\n${'━'.repeat(32)}\n\n`;
  order.forEach(tag=>{
    const items=dl.filter(e=>e.tag===tag);
    if(!items.length) return;
    out+=`${ico[tag]} ${tag}\n`;
    items.forEach(e=>{
      const hstr=(e.htags||[]).length ? '  '+e.htags.join(' ')+'\n' : '';
      out+=`  ${e.time}　${e.text}\n${hstr}`;
    });
    out+='\n';
  });
  return out.trim();
}

// ── WEEKLY REPORT ──
function genWeekly() {
  const today=new Date();
  const cutoff=new Date(today); cutoff.setDate(cutoff.getDate()-6);
  const cs=ds(cutoff);
  const wl=logs.filter(e=>e.date>=cs);
  if(!wl.length){document.getElementById('weekly-box').value='（直近7日間のログはありません）';return;}
  const dates=[...new Set(wl.map(e=>e.date))].sort().reverse();
  let out=`【週まとめ】${cs} 〜 ${ds(today)}\n${'━'.repeat(32)}\n\n`;
  const outcomes=wl.filter(e=>e.tag==='成果');
  if(outcomes.length){
    out+=`✅ 今週の成果 (${outcomes.length}件)\n`;
    outcomes.forEach(e=>{out+=`  ${e.date} ${e.time}　${e.text}\n`;});
    out+='\n';
  }
  const issues=wl.filter(e=>e.tag==='課題');
  if(issues.length){
    out+=`⚠️ 積み残し課題 (${issues.length}件)\n`;
    issues.forEach(e=>{out+=`  ${e.date} ${e.time}　${e.text}\n`;});
    out+='\n';
  }
  out+=`📊 日別ログ数\n`;
  dates.forEach(d=>{
    const [y2,m2,d2]=d.split('-').map(Number);
    out+=`  ${new Date(y2,m2-1,d2).toLocaleDateString('ja-JP',{month:'short',day:'numeric',weekday:'short'})}　${wl.filter(e=>e.date===d).length}件\n`;
  });
  document.getElementById('weekly-box').value=out.trim();
}

// ── SUMMARY TABS ──
function selStab(btn,paneId) {
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.spane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(paneId).classList.add('on');
  if(paneId==='sp-weekly') genWeekly();
}

// ── ARCHIVE ──
function renderArcSidebar() {
  const kw=document.getElementById('arc-search').value.trim();
  const today=ds(new Date());
  const dates=[...new Set(logs.map(e=>e.date))].sort().reverse();
  const filtered=kw?dates.filter(d=>d.includes(kw)):dates;
  document.getElementById('date-list').innerHTML = filtered.map(d=>{
    const count=logs.filter(e=>e.date===d).length;
    const [y,m,dd]=d.split('-').map(Number);
    const dayStr=new Date(y,m-1,dd).toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
    const isT=d===today;
    return `<div class="date-item${arcDate===d?' sel':''}" onclick="selectArcDate('${d}')">
      <div><div class="di-day${isT?' today':''}">${isT?'📌 ':''}${dayStr}</div>
      <div class="di-meta">${d}</div></div>
      <div class="di-badge">${count}</div></div>`;
  }).join('')||'<div style="padding:16px;font-size:12px;color:var(--muted);text-align:center">該当なし</div>';
}
function filterDates(){renderArcSidebar();}

function selectArcDate(date) {
  arcDate=date;
  renderArcSidebar();
  const dl=logs.filter(e=>e.date===date).sort((a,b)=>a.time.localeCompare(b.time));
  const [y,m,d]=date.split('-').map(Number);
  const lbl=new Date(y,m-1,d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const today=ds(new Date());
  document.getElementById('arc-title').textContent=(date===today?'📌 今日 · ':'')+lbl;
  document.getElementById('arc-count').textContent=`${dl.length}件`;
  document.getElementById('arc-entries').innerHTML = dl.length ? dl.map(e=>{
    const htags=e.htags||[];
    const tagsHtml=htags.length?`<div class="entry-htags">${htags.map(t=>`<span class="ehtag">${t}</span>`).join('')}</div>`:'';
    let text=e.text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
    return `<div class="tl-entry">
      <div class="tl-time">${e.time}</div>
      <div class="tl-dot tl-dot-${e.tag}"></div>
      <div class="tl-card">
        <div class="ebtns">
          <button class="ebt e" onclick="openEdit('${e.id}')">✎</button>
          <button class="ebt d" onclick="delLog('${e.id}')">✕</button>
        </div>
        <span class="tl-tag etag-${e.tag}">${e.tag}</span>
        <div class="tl-text">${text}</div>
        ${tagsHtml}
      </div></div>`;
  }).join('') : '<div class="arc-empty"><div style="font-size:28px;opacity:.2">📭</div><div style="font-size:12px">この日のログはありません</div></div>';
  document.getElementById('arc-rbox').value=buildReport(date);
}

// ── COPY ──
function copyRep(boxId,okId) {
  navigator.clipboard.writeText(document.getElementById(boxId).value).then(()=>{
    const el=document.getElementById(okId);
    el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),2000);
  });
}
function copyDay(date) {
  const text=logs.filter(e=>e.date===date).map(e=>`${e.time}　[${e.tag}] ${e.text}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>toast('📋 コピーしました'));
}

// ── REFRESH ALL ──
function refreshAll() {
  renderStream();
  renderTagCloud();
  renderStats();
  renderDateSel();
  genDaily();
  genWeekly();
  if(curPage==='archive'){renderArcSidebar();if(arcDate)selectArcDate(arcDate);}
}

// ── UTILS ──
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function ts(d){return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function bak(){localStorage.setItem('wlbak',JSON.stringify(logs))}
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function fmtDate(str){
  const[y,m,d]=str.split('-').map(Number);
  return(str===ds(new Date())?'📌 今日 · ':'')+new Date(y,m-1,d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);
}

init();
</script>
